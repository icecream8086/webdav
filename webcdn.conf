# /etc/nginx/conf.d/webcdn.conf
server {
    listen 5500;
    server_name _;
    
    # 设置 WebDAV 存储目录
    root /data/nginx-upload-storage;
    
    # 不限制文件大小
    client_max_body_size 0;
    
    # 默认 Content-Type 为 JSON（适用于错误响应等）
    default_type application/json;
    
    # CORS 头（始终添加）
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, PUT, DELETE, MKCOL, COPY, MOVE, OPTIONS, PROPFIND, LOCK, UNLOCK" always;
    add_header Access-Control-Allow-Headers "*" always;
    
    # 错误页面配置（返回 JSON 格式）
    error_page 400 @json_400;
    error_page 403 @json_403;
    error_page 404 @json_404;
    error_page 405 @json_405;
    error_page 500 @json_500;
    error_page 502 @json_502;
    error_page 503 @json_503;
    error_page 504 @json_504;
    
    # 各错误响应的 JSON 内容
    location @json_400 {
        default_type application/json;
        return 400 '{"error":"Bad Request","status":400}';
    }
    location @json_403 {
        default_type application/json;
        return 403 '{"error":"Forbidden","status":403}';
    }
    location @json_404 {
        default_type application/json;
        return 404 '{"error":"Not Found","status":404}';
    }
    location @json_405 {
        default_type application/json;
        return 405 '{"error":"Method Not Allowed","status":405}';
    }
    location @json_500 {
        default_type application/json;
        return 500 '{"error":"Internal Server Error","status":500}';
    }
    location @json_502 {
        default_type application/json;
        return 502 '{"error":"Bad Gateway","status":502}';
    }
    location @json_503 {
        default_type application/json;
        return 503 '{"error":"Service Unavailable","status":503}';
    }
    location @json_504 {
        default_type application/json;
        return 504 '{"error":"Gateway Timeout","status":504}';
    }
    
    # 主 location - 处理所有 WebDAV 请求
    location / {
        # 设置字符集为 UTF-8，解决 autoindex 中文乱码
        charset utf-8;
        
        autoindex on;
        autoindex_localtime on;
        autoindex_exact_size off;
        
        # 客户端请求体临时路径
        client_body_temp_path /tmp;
        
        # 为目录 URI 后加上斜杠，解决客户端兼容性问题
        set $dest $http_destination;
        if (-d $request_filename) {
            rewrite ^(.*[^/])$ $1/;
            set $dest $dest/;
        }

        if ($request_method ~ (MOVE|COPY)) {
            # 对 MOVE|COPY 方法强制添加 Destination 请求头
            add_header Destination $dest;
        }

        if ($request_method ~ MKCOL) {
            rewrite ^(.*[^/])$ $1/ break;
        }

        # DAV 支持的请求方法
        dav_methods PUT DELETE MKCOL COPY MOVE;
        
        # DAV 扩展支持的请求方法（需要 nginx-dav-ext-module）
        # dav_ext_methods PROPFIND OPTIONS LOCK UNLOCK;
        
        # DAV 扩展锁绑定的内存区域（需要 nginx-dav-ext-module）
        # dav_ext_lock zone=davlock;
        
        # 启用创建目录支持
        create_full_put_path on;
        
        # 设置创建的文件及目录的访问权限
        dav_access user:rw group:r all:r;
        
        # OPTIONS 预检
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
    
    # 健康检查
    location /health {
        default_type application/json;    # 改为 JSON 格式
        return 200 '{"info":"healthy","success":true,"status":200}';
    }
}